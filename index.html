<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Ahmad Riandi</title>
    <!-- Memanggil library ikon Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); padding: 20px; }
        .profile-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 100%; max-width: 320px; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { margin: 10px 0; font-size: 24px; color: #333; }
        .bio-text { margin: 15px 0; font-size: 14px; color: #666; line-height: 1.5; }
        
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 85%; padding: 12px; text-decoration: none; color: white; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        
        .btn-play { background-color: #333; }
        .btn-ig { background-color: #E1306C; }
        .btn-tt { background-color: #000; }
        .btn-wa { background-color: #25D366; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>

    <audio id="myAudio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="profile-card">
        <img src="foto.jpg" alt="Ahmad Riandi" class="profile-img">
        <h1>AHMAD RIANDI</h1>
        
        <div class="bio-text">
            Hai, aku Ahmad Riandi, 17 tahun. Katanya sih aku lumayan ganteng 😄. Mari berteman!
        </div>

        <div class="btn-container">
            <button id="playBtn" class="btn btn-play" onclick="togglePlay()"><i class="fas fa-music"></i> Putar Musik</button>
            
            <a href="https://www.instagram.com/nestle_miloooo" class="btn btn-ig" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            
            <a href="https://www.tiktok.com/@76appel_01" class="btn btn-tt" target="_blank">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://wa.me/6285248565872" class="btn btn-wa" target="_blank">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
        </div>
    </div>

    <script>
        function togglePlay() {
            var audio = document.getElementById("myAudio");
            var btn = document.getElementById("playBtn");
            if (audio.paused) {
                audio.play();
                btn.innerHTML = '<i class="fas fa-pause"></i> Hentikan Musik';
            } else {
                audio.pause();
                btn.innerHTML = '<i class="fas fa-music"></i> Putar Musik';
            }
        }
    </script>

</body>
</html>
